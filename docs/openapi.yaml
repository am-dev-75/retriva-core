openapi: 3.1.0
info:
  title: Retriva API
  description: |
    Retriva provides a comprehensive set of APIs for document ingestion, retrieval, and integration with Retriva WebUI.

    The system consists of three main components:
    * **Retriva Core (Ingestion)**: Handles data processing, chunking, and indexing.
    * **Retriva Core (OpenAI API)**: Provides OpenAI-compatible endpoints for RAG.
    * **Retriva Gateway**: Sits between Retriva WebUI and Retriva Core.
  version: 1.0.0
  contact:
    name: Andrea Marson
    email: am.dev.75@gmail.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: http://localhost:8000
    description: Retriva Core (Ingestion API)
  - url: http://localhost:8001
    description: Retriva Core (OpenAI Chat API)
  - url: http://localhost:8002
    description: Retriva Gateway API

tags:
  - name: Ingestion v1 (legacy)
    description: Document and data processing pipeline
  - name: Chat
    description: OpenAI-compatible retrieval and completion
  - name: Gateway
    description: Integration and synchronization with Retriva WebUI
  - name: Jobs v1 (legacy)
    description: Ingestion job management
  - name: Ingestion v2
    description: Generic multi-tool document ingestion (v2)
  - name: Jobs v2
    description: Extended ingestion job management (v2)
  - name: Artifacts v2
    description: Document generation and rendering (v2)
  - name: Metadata v2
    description: Metadata schema and values discovery (v2)
  - name: Retrieval v2
    description: Vector and metadata-filtered retrieval (v2)
  - name: Internal
    description: Debugging and observability endpoints

paths:
  # --- Ingestion v1 (legacy) API ---
  /api/v1/ingest/text:
    post:
      tags: [Ingestion v1]
      summary: Ingest plain text
      operationId: ingestText
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TextIngestRequest"
      responses:
        "202":
          description: Accepted for processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResponse"

  /api/v1/ingest/HTML:
    post:
      tags: [Ingestion v1]
      summary: Ingest HTML content
      operationId: ingestHtml
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HtmlIngestRequest"
      responses:
        "202":
          description: Accepted for processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResponse"

  /api/v1/ingest/pdf:
    post:
      tags: [Ingestion v1]
      summary: Ingest PDF page
      operationId: ingestPdf
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PdfIngestRequest"
      responses:
        "202":
          description: Accepted for processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResponse"

  /api/v1/ingest/markdown:
    post:
      tags: [Ingestion v1]
      summary: Ingest Markdown sections
      operationId: ingestMarkdown
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkdownIngestRequest"
      responses:
        "202":
          description: Accepted for processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResponse"

  /api/v1/ingest/image:
    post:
      tags: [Ingestion v1]
      summary: Ingest local image file
      operationId: ingestImage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImageIngestRequest"
      responses:
        "202":
          description: Accepted for processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResponse"

  /api/v1/ingest/mediawiki:
    post:
      tags: [Ingestion v1]
      summary: Ingest MediaWiki export page
      operationId: ingestMediaWiki
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaWikiIngestRequest"
      responses:
        "202":
          description: Accepted for processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResponse"

  /api/v1/ingest/chunks:
    post:
      tags: [Ingestion v1]
      summary: Ingest raw chunks
      operationId: ingestChunks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChunkIngestRequest"
      responses:
        "202":
          description: Accepted for processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResponse"

  /api/v1/ingest/collection:
    delete:
      tags: [Ingestion v1]
      summary: Clear entire vector collection
      operationId: clearCollection
      responses:
        "200":
          description: Collection cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResponse"

  /api/v1/documents/{doc_id}:
    delete:
      tags: [Ingestion v1]
      summary: Delete a document and its chunks
      operationId: deleteDocument
      parameters:
        - name: doc_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Document deleted or not found (idempotent)

  # --- Jobs API ---
  /api/v1/jobs:
    get:
      tags: [Jobs v1]
      summary: List recent ingestion jobs
      operationId: listJobs
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobResponse"

  /api/v1/jobs/{job_id}:
    get:
      tags: [Jobs v1]
      summary: Get job status
      operationId: getJob
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"

  /api/v1/jobs/{job_id}/cancel:
    post:
      tags: [Jobs v1]
      summary: Request job cancellation
      operationId: cancelJob
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cancellation requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResponse"

  # --- v2 Ingestion API ---
  /api/v2/documents:
    get:
      tags: [Ingestion v2]
      summary: List unique documents
      operationId: listDocumentsV2
      parameters:
        - name: user_metadata_filter
          in: query
          description: JSON-encoded metadata filter
          schema:
            type: string
      responses:
        "200":
          description: Document list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentListResponse"
    post:
      tags: [Ingestion v2]
      summary: Generic multi-parser ingestion (JSON body)
      operationId: ingestDocumentV2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentIngestRequestV2"
      responses:
        "202":
          description: Accepted for processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResponseV2"

  /api/v2/documents/filter:
    post:
      tags: [Ingestion v2]
      summary: Filter documents via POST body
      operationId: filterDocumentsV2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentFilterRequest"
      responses:
        "200":
          description: Document list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentListResponse"

  /api/v2/documents/count:
    get:
      tags: [Ingestion v2]
      summary: Count unique documents
      operationId: countDocumentsV2
      parameters:
        - name: user_metadata_filter
          in: query
          description: JSON-encoded metadata filter
          schema:
            type: string
      responses:
        "200":
          description: Document count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentCountResponse"

  /api/v2/documents/upload:
    post:
      tags: [Ingestion v2]
      summary: Generic multi-parser ingestion (multipart upload)
      operationId: uploadDocumentV2
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, source_path]
              properties:
                file:
                  type: string
                  format: binary
                source_path:
                  type: string
                  description: Logic path/URI for the document
                content_type:
                  type: string
                  description: Optional MIME type hint
                user_metadata:
                  type: string
                  description: Optional JSON-encoded user metadata
      responses:
        "202":
          description: Accepted for processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResponseV2"

  /api/v2/documents/{doc_id}:
    get:
      tags: [Ingestion v2]
      summary: Get document details
      operationId: getDocumentV2
      parameters:
        - name: doc_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Document details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentResponse"
        "404":
          description: Document not found

  # --- v2 Jobs API ---
  /api/v2/jobs:
    get:
      tags: [Jobs v2]
      summary: List recent v2 ingestion jobs
      operationId: listJobsV2
      responses:
        "200":
          description: List of jobs with stage information
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobResponseV2"

  /api/v2/jobs/{job_id}:
    get:
      tags: [Jobs v2]
      summary: Get v2 job status
      operationId: getJobV2
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job details with pipeline stage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponseV2"

  # --- Metadata API (v2) ---
  /api/v2/metadata/schema:
    get:
      tags: [Metadata v2]
      summary: Get metadata schema
      operationId: getMetadataSchemaV2
      responses:
        "200":
          description: Available metadata keys
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetadataSchemaResponse"

  /api/v2/metadata/values:
    get:
      tags: [Metadata v2]
      summary: Get values for a metadata key
      operationId: getMetadataValuesV2
      parameters:
        - name: key
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Available values
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetadataValuesResponse"

  # --- Retrieval API (v2) ---
  /api/v2/retrieval/query:
    post:
      tags: [Retrieval v2]
      summary: Vector search with metadata filters
      operationId: queryRetrievalV2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetrievalRequest"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrievalResponse"

  # --- Artifacts API (v2) ---
  /api/v2/artifacts:
    post:
      tags: [Artifacts v2]
      summary: Create artifact generation job
      operationId: createArtifact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArtifactRequestV2"
      responses:
        "202":
          description: Artifact job accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactResponseV2"

  /api/v2/artifacts/{artifact_id}:
    get:
      tags: [Artifacts v2]
      summary: Get artifact metadata and status
      operationId: getArtifact
      parameters:
        - name: artifact_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Artifact job details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponseV2"
        "404":
          description: Artifact not found
    delete:
      tags: [Artifacts v2]
      summary: Delete artifact
      operationId: deleteArtifact
      parameters:
        - name: artifact_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Artifact deleted or not found

  /api/v2/artifacts/{artifact_id}/content:
    get:
      tags: [Artifacts v2]
      summary: Download rendered artifact content
      operationId: getArtifactContent
      parameters:
        - name: artifact_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Rendered file content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "202":
          description: Artifact generation still in progress
        "404":
          description: Artifact not found

  /api/v2/capabilities:
    get:
      tags: [Artifacts v2]
      summary: Get system capabilities and renderers
      operationId: getCapabilities
      responses:
        "200":
          description: Capability report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactCapabilitiesResponseV2"

  # --- OpenAI Chat API ---
  /v1/models:
    get:
      tags: [Chat]
      summary: List available models
      operationId: listModels
      responses:
        "200":
          description: OpenAI-compatible model list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListModelsResponse"

  /v1/chat/completions:
    post:
      tags: [Chat]
      summary: Chat completion with RAG
      operationId: chatCompletion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatCompletionRequest"
      responses:
        "200":
          description: Chat completion result (or stream if requested)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ChatCompletionResponse"
                  - type: string
                    format: binary
                    description: Server-Sent Events stream

  # --- Gateway API ---
  /healthz:
    get:
      tags: [Gateway]
      summary: Liveness probe
      responses:
        "200":
          description: OK

  /readyz:
    get:
      tags: [Gateway]
      summary: Readiness probe
      responses:
        "200":
          description: System ready
        "503":
          description: Service unavailable

  /api/v1/sync:
    post:
      tags: [Gateway]
      summary: Trigger manual synchronization cycle
      responses:
        "200":
          description: Sync results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResult"

  /api/v1/mappings:
    get:
      tags: [Gateway]
      summary: List file mappings
      responses:
        "200":
          description: List of mappings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MappingRecord"

  /api/v1/chat/message:
    post:
      tags: [Gateway]
      summary: Receive chat message webhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessagePayload"
      responses:
        "200":
          description: Processing status

  /api/v1/events:
    post:
      tags: [Gateway]
      summary: Receive system events webhook
      responses:
        "200":
          description: Event processed

  /metrics:
    get:
      tags: [Gateway]
      summary: Prometheus metrics
      responses:
        "200":
          description: Plaintext metrics

  # --- Internal / Debug API ---
  /internal/ingestion-tagging/{chat_id}:
    get:
      tags: [Internal]
      summary: Inspect ingestion context for a chat
      parameters:
        - name: chat_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Context state

  /internal/mappings/documents:
    get:
      tags: [Internal]
      summary: List all document mappings (internal)
      responses:
        "200":
          description: List of records

  /internal/mappings/documents/{owui_file_id}:
    get:
      tags: [Internal]
      summary: Get mapping for a specific file
      parameters:
        - name: owui_file_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Mapping record

  /internal/mappings/knowledge-bases:
    get:
      tags: [Internal]
      summary: List knowledge base mappings
      responses:
        "200":
          description: List of KB mappings

components:
  schemas:
    # --- Ingestion Schemas ---
    TextIngestRequest:
      type: object
      required: [source_path, content_text]
      properties:
        source_path: { type: string }
        page_title: { type: string }
        content_text: { type: string }
        user_metadata: { type: object, additionalProperties: { type: string } }

    HtmlIngestRequest:
      type: object
      required: [source_path, html_content]
      properties:
        source_path: { type: string }
        page_title: { type: string }
        html_content: { type: string }
        origin_file_path: { type: string }
        user_metadata: { type: object, additionalProperties: { type: string } }

    PdfIngestRequest:
      type: object
      required: [source_path, content_text, page_number]
      properties:
        source_path: { type: string }
        page_title: { type: string }
        content_text: { type: string }
        page_number: { type: integer }
        total_pages: { type: integer }
        user_metadata: { type: object, additionalProperties: { type: string } }

    MarkdownSection:
      type: object
      required: [content]
      properties:
        heading: { type: string }
        content: { type: string }

    MarkdownIngestRequest:
      type: object
      required: [source_path, page_title, sections]
      properties:
        source_path: { type: string }
        page_title: { type: string }
        sections:
          type: array
          items:
            $ref: "#/components/schemas/MarkdownSection"
        user_metadata: { type: object, additionalProperties: { type: string } }

    ImageIngestRequest:
      type: object
      required: [source_path, file_path]
      properties:
        source_path: { type: string }
        page_title: { type: string }
        file_path: { type: string }
        user_metadata: { type: object, additionalProperties: { type: string } }

    MediaWikiIngestRequest:
      type: object
      required: [source_path, page_title, content_text]
      properties:
        source_path: { type: string }
        page_title: { type: string }
        content_text: { type: string }
        page_id: { type: integer }
        namespace: { type: integer }
        linked_assets:
          type: array
          items: { type: string }
        user_metadata: { type: object, additionalProperties: { type: string } }

    ChunkIngestRequest:
      type: object
      required: [chunks]
      properties:
        chunks:
          type: array
          items: { type: object } # Simplification for Chunk

    IngestResponse:
      type: object
      required: [status, message]
      properties:
        status: { type: string }
        message: { type: string }
        job_id: { type: string }

    IngestResponseV2:
      type: object
      required: [status, message, job_id]
      properties:
        status: { type: string }
        message: { type: string }
        job_id: { type: string }

    DocumentIngestRequestV2:
      type: object
      required: [source_uri]
      properties:
        source_uri:
          type: string
          description: Path or URI to the document to ingest.
        content_type:
          type: string
          description: Explicit MIME type hint.
        user_metadata:
          type: object
          additionalProperties: { type: string }
          description: Optional user-provided key/value metadata.
        parser_hint:
          type: string
          description: Force a specific parser backend (e.g. 'docling', 'ocrmypdf').

    JobStage:
      type: string
      enum:
        [DETECTING, PREPROCESSING, PARSING, NORMALIZATION, CHUNKING, INDEXING]
      description: Ordered stages of the v2 ingestion pipeline.

    JobResponseV2:
      type: object
      properties:
        job_id: { type: string }
        status: { type: string }
        source: { type: string }
        job_type: { type: string }
        current_stage: { type: string }
        stages_completed: { type: array, items: { type: string } }
        created_at: { type: string }
        updated_at: { type: string }
        error: { type: string }

    ArtifactRequestV2:
      type: object
      required: [artifact_type, format]
      properties:
        artifact_type: { type: string }
        format: { type: string }
        parameters: { type: object, additionalProperties: { type: string } }
        user_metadata: { type: object, additionalProperties: { type: string } }

    ArtifactResponseV2:
      type: object
      properties:
        status: { type: string }
        message: { type: string }
        job_id: { type: string }
        artifact_id: { type: string }

    ArtifactCapabilitiesResponseV2:
      type: object
      properties:
        supported_formats: { type: array, items: { type: string } }
        supported_types: { type: array, items: { type: string } }
        templates: { type: array, items: { type: string } }
        error: { type: string }

    JobResponse:
      type: object
      required: [job_id, status, source, job_type, created_at, updated_at]
      properties:
        job_id: { type: string }
        status: { type: string }
        source: { type: string }
        job_type: { type: string }
        created_at: { type: string }
        updated_at: { type: string }
        error: { type: string }

    DocumentResponse:
      type: object
      required: [doc_id, source_path, page_title]
      properties:
        doc_id: { type: string }
        source_path: { type: string }
        page_title: { type: string }
        user_metadata: { type: object, additionalProperties: { type: string } }

    DocumentListResponse:
      type: object
      required: [documents, total]
      properties:
        documents:
          type: array
          items:
            $ref: "#/components/schemas/DocumentResponse"
        total: { type: integer }

    DocumentCountResponse:
      type: object
      required: [count]
      properties:
        count: { type: integer }

    MetadataSchemaResponse:
      type: object
      required: [keys]
      properties:
        keys:
          type: array
          items: { type: string }

    MetadataValuesResponse:
      type: object
      required: [key, values]
      properties:
        key: { type: string }
        values:
          type: array
          items: { type: string }

    RetrievalRequest:
      type: object
      required: [query]
      properties:
        query: { type: string }
        top_k: { type: integer, default: 5 }
        user_metadata_filter:
          { type: object, additionalProperties: { type: string } }

    RetrievalResponse:
      type: object
      required: [chunks]
      properties:
        chunks:
          type: array
          items: { type: object }

    DocumentFilterRequest:
      type: object
      properties:
        metadata_filter:
          type: object
          properties:
            user_metadata:
              type: object
              additionalProperties: { type: string }

    # --- OpenAI Schemas ---
    ListModelsResponse:
      type: object
      properties:
        object: { type: string }
        data:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              object: { type: string }
              created: { type: integer }
              owned_by: { type: string }

    ChatCompletionRequest:
      type: object
      required: [model, messages]
      properties:
        model: { type: string }
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        stream: { type: boolean }
        temperature: { type: number }
        top_p: { type: number }

    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role: { type: string, enum: [system, user, assistant] }
        content: { type: string }
        metadata: { type: object }

    ChatCompletionResponse:
      type: object
      properties:
        id: { type: string }
        object: { type: string }
        created: { type: integer }
        model: { type: string }
        choices:
          type: array
          items:
            type: object
            properties:
              index: { type: integer }
              message:
                $ref: "#/components/schemas/ChatMessage"
              finish_reason: { type: string }
        usage:
          type: object
          properties:
            prompt_tokens: { type: integer }
            completion_tokens: { type: integer }
            total_tokens: { type: integer }
        sources:
          type: array
          items: { type: object }

    # --- Gateway Schemas ---
    SyncResult:
      type: object
      properties:
        ingested: { type: integer }
        deleted: { type: integer }
        failed: { type: integer }
        retried: { type: integer }
        skipped: { type: integer }
        errors: { type: array, items: { type: string } }

    MappingRecord:
      type: object
      properties:
        owui_file_id: { type: string }
        filename: { type: string }
        retriva_doc_id: { type: string }
        content_hash: { type: string }
        status: { type: string }
        created_at: { type: string }
        updated_at: { type: string }

    ChatMessagePayload:
      type: object
      required: [chat_id, message]
      properties:
        chat_id: { type: string }
        message: { type: string }
        kb_ids: { type: array, items: { type: string } }
        file_ids: { type: array, items: { type: string } }
